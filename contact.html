  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0e; --bg2: #181816; --bg3: #222220;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #f0ede6; --muted: #8a8880;
      --accent: #d4789a; --accent2: #7ecba1; --accent3: #6eb3c9;
      --radius: 14px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
    .page { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

    /* NAV */
    nav { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.5s ease forwards; }
    nav a { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border); border-radius: 999px; transition: color 0.15s, border-color 0.15s; }
    nav a:hover, nav a.active { color: var(--accent); border-color: var(--accent); }

    /* HERO */
    .hero { margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.6s ease 0.05s forwards; }
    .hero-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 600; color: var(--text); line-height: 1.1; margin-bottom: 0.5rem; }
    .hero p { font-size: 15px; color: var(--muted); font-weight: 300; }

    /* FORM CARD */
    .form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; opacity: 0; animation: fadeUp 0.6s ease 0.1s forwards; }

    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .field input, .field textarea, .field select {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 300; padding: 12px 14px;
      transition: border-color 0.15s, background 0.15s; outline: none; resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); background: #1e1e1c; }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); opacity: 0.6; }
    .field textarea { min-height: 130px; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .submit-btn {
      width: 100%; padding: 14px; background: transparent; border: 1px solid var(--accent);
      border-radius: 8px; color: var(--accent); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.05em; cursor: pointer;
      transition: background 0.18s, color 0.18s, transform 0.12s;
      margin-top: 0.5rem;
    }
    .submit-btn:hover { background: var(--accent); color: var(--bg); }
    .submit-btn:active { transform: scale(0.98); }

    /* SUCCESS STATE */
    .success-msg { display: none; text-align: center; padding: 2.5rem 1rem; }
    .success-icon { font-size: 36px; margin-bottom: 1rem; }
    .success-msg h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text); margin-bottom: 0.5rem; }
    .success-msg p { color: var(--muted); font-size: 14px; font-weight: 300; }

    .note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 1rem; font-weight: 300; opacity: 0; animation: fadeUp 0.6s ease 0.2s forwards; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    footer { text-align: center; font-size: 12px; color: var(--muted); font-weight: 300; letter-spacing: 0.03em; margin-top: 3rem; opacity: 0; animation: fadeUp 0.6s ease 0.4s forwards; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 480px) { .page { padding: 2rem 1rem 4rem; } .hero h1 { font-size: 32px; } .field-row { grid-template-columns: 1fr; } .form-card { padding: 1.25rem; } }
  </style>
</head>
<body>
<div class="page">

    <script src="nav.js"></script>
  <script src="theme.js"></script>

  <div class="hero">
    <div class="hero-label">Get in touch</div>
    <h1>Say hello.</h1>
    <p>Have a question or just want to reach out? Drop a message below.</p>
  </div>

  <div class="form-card">
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="thanks.html">
      <input type="hidden" name="form-name" value="contact" />
      <p style="display:none;"><input name="bot-field" /></p>
      <div class="field-row">
        <div class="field">
          <label for="fname">First name</label>
          <input type="text" id="fname" name="first-name" placeholder="Jane" />
        </div>
        <div class="field">
          <label for="lname">Last name</label>
          <input type="text" id="lname" name="last-name" placeholder="Smith" />
        </div>
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required />
      </div>
      <div class="field">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="What's this about?" />
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send message &nbsp;→</button>
    </form>
  </div>

  <p class="note">Netlify delivers your message directly &mdash; no email app needed.</p>

  <hr class="divider" />
  <footer><p>jonestes.me &nbsp;·&nbsp; built with care</p></footer>
</div>

</body>
</html>
