<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f0f0e" />
<title>Labels · Jon Estes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0f0f0e; --panel:#16140f; --line:#2a261a;
    --text:#ece7de; --muted:#9aa0a0; --dim:#6e6a5c; --gold:#d4af37;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;}
  .wrap{max-width:1000px;margin:0 auto;padding:48px 20px 100px;}
  h1{font-family:'Playfair Display',serif;font-weight:700;font-size:34px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:14px;margin:0 0 28px;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:20px;}
  label{display:block;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--dim);margin-bottom:6px;}
  input,textarea,select{width:100%;background:#0f0f0e;border:1px solid var(--line);border-radius:7px;
    color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 11px;}
  textarea{font-family:'DM Mono',monospace;font-size:12.5px;min-height:90px;resize:vertical;}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
  .row3{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:14px;}
  button{background:var(--gold);color:#1a160c;border:none;font-weight:600;
    font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 18px;border-radius:8px;cursor:pointer;}
  button.ghost{background:none;border:1px solid var(--line);color:var(--text);font-weight:500;}
  .actions{display:flex;gap:10px;flex-wrap:wrap;}
  .hint{color:var(--dim);font-size:12px;margin-top:8px;line-height:1.6;}
  .hint code{color:var(--copper,#b87333);}

  .count-bar{display:flex;justify-content:space-between;align-items:center;margin:24px 0 14px;}
  .count-bar span{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

  /* Screen preview of sheet */
  .sheet{background:#fff;border-radius:6px;padding:0.5in 0.1875in;display:grid;
    grid-template-columns:repeat(3,2.625in);grid-auto-rows:1in;gap:0;justify-content:center;
    margin:0 auto;box-shadow:0 8px 30px #0006;}
  .label{display:flex;align-items:center;gap:8px;padding:6px 8px;color:#111;overflow:hidden;
    border:1px dashed #ddd;}
  .label canvas{width:.78in;height:.78in;flex-shrink:0;}
  .label .meta{overflow:hidden;}
  .label .meta .name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:10.5px;
    line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .label .meta .sub2{font-family:'DM Mono',monospace;font-size:8.5px;color:#555;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty-slot{border:1px dashed #eee;}

  @media print {
    body{background:#fff;}
    .wrap > *:not(#sheetWrap){display:none !important;}
    .panel, h1, .sub, .count-bar{display:none !important;}
    .sheet{box-shadow:none;margin:0;border-radius:0;}
    @page{size:letter;margin:0;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Label / Tag Printer</h1>
  <p class="sub">Printable QR labels for coin lots — Avery 5160 sheet (3×10, 30 per page)</p>

  <div class="panel">
    <div class="row3">
      <div>
        <label>Lot name</label>
        <input id="fName" placeholder="1921-S Morgan Dollar" />
      </div>
      <div>
        <label>Lot ID</label>
        <input id="fId" placeholder="LOT-0142" />
      </div>
    </div>
    <div class="row">
      <div>
        <label>Cost basis (optional)</label>
        <input id="fCost" placeholder="$38.50" />
      </div>
      <div style="grid-column: span 2;">
        <label>Link target (defaults to your inventory page)</label>
        <input id="fUrl" placeholder="https://jonestes.me/inventory?lot=LOT-0142" />
      </div>
    </div>
    <div class="actions">
      <button id="addBtn">Add label</button>
      <button class="ghost" id="clearBtn">Clear all</button>
    </div>
    <p class="hint">Or paste bulk rows below as <code>name, lot id, cost</code> — one per line — then click "Add bulk."</p>
    <textarea id="bulkInput" placeholder="1921-S Morgan Dollar, LOT-0142, 38.50&#10;1964 Kennedy Half, LOT-0143, 6.25"></textarea>
    <div class="actions" style="margin-top:10px;">
      <button class="ghost" id="bulkBtn">Add bulk</button>
    </div>
  </div>

  <div class="count-bar">
    <span id="countLabel">0 labels · 0 sheets</span>
    <div class="actions">
      <button id="printBtn">Print sheet</button>
    </div>
  </div>

  <div id="sheetWrap"></div>
</div>

<script>
const STORE_KEY = "jonestes_labels_v1";
let labels = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(labels)); }

function defaultUrl(id) {
  return id ? `https://jonestes.me/inventory?lot=${encodeURIComponent(id)}` : "https://jonestes.me/inventory";
}

function addLabel({ name, id, cost, url }) {
  if (!name) return;
  labels.push({ name, id: id || "", cost: cost || "", url: url || defaultUrl(id) });
  save();
  render();
}

document.getElementById("addBtn").addEventListener("click", () => {
  const name = document.getElementById("fName").value.trim();
  const id = document.getElementById("fId").value.trim();
  const cost = document.getElementById("fCost").value.trim();
  const url = document.getElementById("fUrl").value.trim();
  addLabel({ name, id, cost, url });
  ["fName", "fId", "fCost", "fUrl"].forEach((f) => (document.getElementById(f).value = ""));
});

document.getElementById("bulkBtn").addEventListener("click", () => {
  const raw = document.getElementById("bulkInput").value.trim();
  if (!raw) return;
  raw.split("\n").forEach((line) => {
    const [name, id, cost] = line.split(",").map((s) => (s || "").trim());
    if (name) addLabel({ name, id, cost });
  });
  document.getElementById("bulkInput").value = "";
});

document.getElementById("clearBtn").addEventListener("click", () => {
  if (confirm("Clear all labels?")) {
    labels = [];
    save();
    render();
  }
});

document.getElementById("printBtn").addEventListener("click", () => window.print());

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function render() {
  const perSheet = 30;
  const sheets = Math.max(1, Math.ceil(labels.length / perSheet));
  document.getElementById("countLabel").textContent =
    `${labels.length} label${labels.length === 1 ? "" : "s"} · ${sheets} sheet${sheets === 1 ? "" : "s"}`;

  const wrap = document.getElementById("sheetWrap");
  wrap.innerHTML = "";

  for (let s = 0; s < sheets; s++) {
    const sheetDiv = document.createElement("div");
    sheetDiv.className = "sheet";
    sheetDiv.style.marginBottom = "24px";
    const slice = labels.slice(s * perSheet, s * perSheet + perSheet);
    for (let i = 0; i < perSheet; i++) {
      const item = slice[i];
      const cell = document.createElement("div");
      cell.className = item ? "label" : "label empty-slot";
      if (item) {
        const canvas = document.createElement("canvas");
        cell.appendChild(canvas);
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `<div class="name">${escapeHtml(item.name)}</div>
          <div class="sub2">${escapeHtml(item.id)}${item.cost ? " · " + escapeHtml(item.cost) : ""}</div>`;
        cell.appendChild(meta);
        QRCode.toCanvas(canvas, item.url, { margin: 0, width: 80, color: { dark: "#111111", light: "#ffffff" } });
      }
      sheetDiv.appendChild(cell);
    }
    wrap.appendChild(sheetDiv);
  }
}

render();
</script>
</body>
</html>
