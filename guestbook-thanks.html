  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0e; --bg2: #181816; --bg3: #222220;
      --border: rgba(255,255,255,0.08);
      --text: #f0ede6; --muted: #8a8880;
      --accent: #d4789a; --accent2: #7ecba1;
      --radius: 14px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
    .box { position: relative; z-index: 1; text-align: center; padding: 3rem 2rem; max-width: 480px; }
    .icon { font-size: 48px; margin-bottom: 1.5rem; opacity: 0; animation: pop 0.5s ease forwards; }
    h1 { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; opacity: 0; animation: fadeUp 0.6s ease 0.15s forwards; }
    p { font-size: 15px; color: var(--muted); font-weight: 300; line-height: 1.7; margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.6s ease 0.25s forwards; }
    a { display: inline-block; padding: 10px 24px; border: 1px solid var(--accent); border-radius: 999px; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.18s, color 0.18s; opacity: 0; animation: fadeUp 0.6s ease 0.35s forwards; }
    a:hover { background: var(--accent); color: var(--bg); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
  </style>
  <script src="theme.js"></script>

<body>
  <div class="box">
    <div class="icon">✉️</div>
    <h1>Message received!</h1>
    <p>Thanks for reaching out. Jon will get back to you soon.</p>

  </div>
