<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar · Jon Estes</title>

  <!-- ============================================================
    SETUP INSTRUCTIONS
    ============================================================
    1. Go to https://console.cloud.google.com/
    2. Create a new project (or use an existing one)
    3. Enable "Google Calendar API" under APIs & Services > Library
    4. Go to APIs & Services > Credentials
    5. Create an OAuth 2.0 Client ID:
         - Application type: Web application
         - Authorized JavaScript origins: https://jonestes.me
         - (Also add http://localhost for local testing)
    6. Copy your Client ID and paste it below where it says YOUR_CLIENT_ID
    7. Under APIs & Services > Credentials, also create an API Key
         - Restrict it to "HTTP referrers" → jonestes.me/*
         - Restrict it to "Google Calendar API"
    8. Paste the API Key below where it says YOUR_API_KEY
    ============================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e4dd;
      --border-hover: #ccc8c0;
      --text: #1a1916;
      --text-muted: #7a776f;
      --text-faint: #b0ac a4;
      --accent: #2a5298;
      --accent-light: #e8edf7;
      --today-bg: #2a5298;
      --today-text: #ffffff;
      --radius: 8px;
      --radius-lg: 14px;

      /* Calendar colors */
      --cal-jon: #2a5298;
      --cal-jon-light: #dde5f5;
      --cal-lorina: #b5476e;
      --cal-lorina-light: #f5dde7;
      --cal-ashley: #1a8a62;
      --cal-ashley-light: #d5f0e6;
      --cal-damin: #b06a10;
      --cal-damin-light: #f5e8d0;
      --cal-family: #c04a20;
      --cal-family-light: #f5e0d8;
      --cal-other: #666360;
      --cal-other-light: #ebebeb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ---- SITE HEADER ---- */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      background: var(--surface);
    }
    .site-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
    }
    .site-nav { display: flex; gap: 1.5rem; }
    .site-nav a {
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .site-nav a:hover, .site-nav a.active { color: var(--text); }

    /* ---- PAGE WRAPPER ---- */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ---- PAGE TITLE ---- */
    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }
    .page-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* ---- AUTH SECTION ---- */
    #auth-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 440px;
      margin: 4rem auto;
    }
    #auth-section h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }
    #auth-section p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .sign-in-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .sign-in-btn:hover { background: #1e3d7a; }
    .sign-in-btn:active { transform: scale(0.98); }
    .sign-in-btn svg { width: 18px; height: 18px; }

    /* ---- CALENDAR TOOLBAR ---- */
    .cal-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .cal-month-label {
      font-size: 20px;
      font-weight: 500;
      min-width: 200px;
    }
    .toolbar-spacer { flex: 1; }
    .view-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .view-tab {
      background: none;
      border: none;
      padding: 6px 16px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      border-right: 1px solid var(--border);
      transition: background 0.1s, color 0.1s;
    }
    .view-tab:last-child { border-right: none; }
    .view-tab:hover { background: var(--bg); color: var(--text); }
    .view-tab.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      transition: background 0.1s, color 0.1s;
    }
    .nav-btn:hover { background: var(--surface); color: var(--text); }
    .today-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .today-btn:hover { background: var(--surface); color: var(--text); }
    .sign-out-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
    }
    .sign-out-btn:hover { color: var(--text); }

    /* ---- MONTH VIEW ---- */
    .month-grid-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .dow-label {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 4px 0;
    }
    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .day-cell {
      background: var(--surface);
      min-height: 100px;
      padding: 6px 6px 4px;
    }
    .day-cell.other-month { background: #f5f4f1; }
    .day-cell.today .day-num-wrap {
      background: var(--today-bg);
      color: var(--today-text);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .day-num-wrap {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .day-num {
      font-size: 12px;
      color: var(--text-muted);
    }
    .day-cell.today .day-num { color: var(--today-text); }
    .day-cell.other-month .day-num { color: #bbb; }
    .event-pill {
      font-size: 11px;
      border-radius: 3px;
      padding: 1px 5px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
    .more-events {
      font-size: 10px;
      color: var(--text-muted);
      padding: 1px 4px;
      cursor: default;
    }

    /* ---- LIST VIEW ---- */
    .list-section { margin-bottom: 1.5rem; }
    .list-date-header {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .list-date-header.is-today { color: var(--accent); }
    .list-event-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 10px;
      border-radius: var(--radius);
      transition: background 0.1s;
    }
    .list-event-row:hover { background: var(--surface); }
    .event-color-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .event-details { flex: 1; }
    .event-title { font-size: 14px; color: var(--text); }
    .event-meta { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .no-events {
      font-size: 14px;
      color: var(--text-muted);
      padding: 2rem 0;
      text-align: center;
    }

    /* ---- WEEK VIEW ---- */
    .week-scroll { overflow-x: auto; }
    .week-grid {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-width: 640px;
    }
    .week-col-header {
      text-align: center;
      padding: 8px 4px;
      font-size: 12px;
      border-left: 1px solid var(--border);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-weight: 400;
      color: var(--text-muted);
    }
    .week-col-header.is-today { color: var(--accent); font-weight: 500; }
    .week-col-header.corner { border-left: none; background: var(--bg); }
    .week-time-label {
      font-size: 10px;
      color: var(--text-muted);
      text-align: right;
      padding: 0 6px;
      height: 44px;
      line-height: 44px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .week-cell {
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      height: 44px;
      background: var(--surface);
      position: relative;
    }
    .week-cell.is-today { background: #f4f7fd; }
    .week-event-block {
      position: absolute;
      left: 1px;
      right: 1px;
      top: 1px;
      border-radius: 3px;
      font-size: 10px;
      line-height: 1.3;
      padding: 2px 4px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      z-index: 1;
    }
    .week-allday-row {
      display: contents;
    }
    .week-allday-cell {
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      min-height: 28px;
      background: var(--surface);
      padding: 2px 3px;
    }
    .week-allday-cell.corner { border-left: none; background: var(--bg); font-size: 10px; color: var(--text-muted); display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }

    /* ---- LEGEND ---- */
    .cal-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 1.25rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ---- LOADING ---- */
    .loading-state {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- FOOTER ---- */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .site-header { padding: 0 1rem; }
      .page { padding: 1.25rem 1rem 3rem; }
      .page-title { font-size: 24px; }
      .cal-toolbar { gap: 6px; }
      .cal-month-label { font-size: 16px; min-width: 0; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-logo">Jon Estes</a>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/calendar" class="active">Calendar</a>
    </nav>
  </header>

  <main class="page">
    <h1 class="page-title">📅 Calendar</h1>
    <p class="page-subtitle">Jon's schedule — live from Google Calendar.</p>

    <!-- Auth screen (shown when not signed in) -->
    <div id="auth-section" style="display:none">
      <h2>Sign in to view</h2>
      <p>This calendar is private. Sign in with the Google account that owns these calendars to see events.</p>
      <button class="sign-in-btn" id="authorize-btn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <!-- Calendar UI (shown when signed in) -->
    <div id="calendar-section" style="display:none">
      <div class="cal-toolbar">
        <button class="nav-btn" id="prev-btn" title="Previous">&#8249;</button>
        <button class="nav-btn" id="next-btn" title="Next">&#8250;</button>
        <button class="today-btn" id="today-btn">Today</button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <div class="toolbar-spacer"></div>
        <div class="view-tabs">
          <button class="view-tab active" data-view="month">Month</button>
          <button class="view-tab" data-view="week">Week</button>
          <button class="view-tab" data-view="list">List</button>
        </div>
        <button class="sign-out-btn" id="signout-btn">Sign out</button>
      </div>

      <div id="cal-body">
        <div class="loading-state"><div class="spinner"></div>Loading your calendars…</div>
      </div>

      <div class="cal-legend" id="cal-legend"></div>
    </div>
  </main>

  <footer class="site-footer">
    jonestes.me · built with care
  </footer>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Calendar logic -->
  <script src="calendar.js"></script>

</body>
</html>
