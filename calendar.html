<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f0f0e" />
<title>Family Calendar · Jon Estes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0f0e; --panel:#16140f; --line:#2a261a;
    --text:#ece7de; --muted:#9aa0a0; --dim:#6e6a5c; --gold:#d4af37;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;}
  .wrap{max-width:920px;margin:0 auto;padding:48px 20px 80px;}
  h1{font-family:'Playfair Display',serif;font-weight:700;font-size:34px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:14px;margin:0 0 22px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 24px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);
    font-family:'DM Mono',monospace;}
  .swatch{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .day{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px;}
  .day-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .day-date.today{color:var(--gold);}
  .event{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:14px;}
  .event + .event{border-top:1px solid #221f17;}
  .event .swatch{margin-top:5px;flex-shrink:0;}
  .event .time{color:var(--dim);font-family:'DM Mono',monospace;font-size:12px;min-width:64px;}
  .empty{color:var(--dim);font-size:13px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin:6px 0 16px;}
  .loading{color:var(--dim);font-size:13px;font-family:'DM Mono',monospace;}
  button.ghost{background:none;border:1px solid var(--line);color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;}
  button.ghost:hover{border-color:var(--gold);color:var(--gold);}
  .warn{border:1px dashed #c1554a55;border-radius:8px;padding:10px 14px;color:#d99a92;
    font-size:12.5px;margin-bottom:14px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Family Calendar</h1>
  <p class="sub">Next 14 days, merged across every family calendar — no login required</p>

  <div class="legend" id="legend"></div>
  <div id="warnings"></div>
  <div class="toolbar">
    <span class="loading" id="loadingMsg">Loading…</span>
    <button class="ghost" id="refreshBtn">Refresh</button>
  </div>
  <div id="agenda"></div>
</div>

<script>
async function load() {
  document.getElementById("loadingMsg").textContent = "Loading…";
  document.getElementById("refreshBtn").disabled = true;
  try {
    const res = await fetch("/.netlify/functions/calendar-feed", { cache: "no-store" });
    const data = await res.json();
    renderLegend(data.calendars);
    renderWarnings(data.calendars);
    renderAgenda(data.calendars);
  } catch (err) {
    document.getElementById("agenda").innerHTML =
      `<div class="day"><div class="empty">Couldn't reach the calendar function. Check that calendar-feed.js is deployed and env vars are set.</div></div>`;
  }
  document.getElementById("loadingMsg").textContent = "";
  document.getElementById("refreshBtn").disabled = false;
}

function renderLegend(calendars) {
  document.getElementById("legend").innerHTML = calendars.map(
    (c) => `<span><span class="swatch" style="background:${c.color}"></span>${c.label}</span>`
  ).join("");
}

function renderWarnings(calendars) {
  const broken = calendars.filter((c) => c.error);
  document.getElementById("warnings").innerHTML = broken.length
    ? broken.map((c) => `<div class="warn">${c.label}: ${escapeHtml(c.error)}</div>`).join("")
    : "";
}

function renderAgenda(calendars) {
  const allEvents = [];
  calendars.forEach((cal) => {
    (cal.events || []).forEach((ev) => {
      allEvents.push({ title: ev.summary, start: new Date(ev.start), allDay: ev.allDay, cal });
    });
  });

  const byDay = {};
  allEvents.forEach((ev) => {
    const key = ev.start.toDateString();
    (byDay[key] = byDay[key] || []).push(ev);
  });

  const todayKey = new Date().toDateString();
  const days = Object.keys(byDay).sort((a, b) => new Date(a) - new Date(b));

  if (!days.length) {
    document.getElementById("agenda").innerHTML = `<div class="day"><div class="empty">No events in the next 14 days. Enjoy it.</div></div>`;
    return;
  }

  document.getElementById("agenda").innerHTML = days.map((dayKey) => {
    const dayEvents = byDay[dayKey].sort((a, b) => a.start - b.start);
    const isToday = dayKey === todayKey;
    const dateLabel = new Date(dayKey).toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" });
    const rows = dayEvents.map((ev) => `
      <div class="event">
        <span class="swatch" style="background:${ev.cal.color}"></span>
        <span class="time">${ev.allDay ? "all day" : ev.start.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}</span>
        <span>${escapeHtml(ev.title)} <span style="color:var(--dim);font-size:12px">· ${ev.cal.label}</span></span>
      </div>`).join("");
    return `<div class="day"><div class="day-date${isToday ? " today" : ""}">${isToday ? "Today · " : ""}${dateLabel}</div>${rows}</div>`;
  }).join("");
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

document.getElementById("refreshBtn").addEventListener("click", load);
load();
</script>
</body>
</html>
