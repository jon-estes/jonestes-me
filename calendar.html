<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f0f0e" />
<title>Family Calendar · Jon Estes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0f0e; --panel:#16140f; --panel2:#1b1810; --line:#2a261a;
    --text:#ece7de; --muted:#9aa0a0; --dim:#5c5848; --gold:#d4af37;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;
    background-image:radial-gradient(circle at 1px 1px, #ffffff06 1px, transparent 0);background-size:18px 18px;}
  .wrap{max-width:760px;margin:0 auto;padding:48px 20px 90px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;
    opacity:0;animation:fadeUp .5s ease forwards;}
  h1{font-family:'Playfair Display',serif;font-weight:700;font-size:30px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin:0;}
  .legend{display:flex;gap:10px;flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);
    font-family:'DM Mono',monospace;}
  .swatch{width:7px;height:7px;border-radius:50%;display:inline-block;}

  /* ---- mini calendar grid ---- */
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;
    opacity:0;animation:fadeUp .5s ease .05s forwards;}
  .dow{text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);
    text-transform:uppercase;letter-spacing:.06em;padding-bottom:4px;}
  .cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:9px 6px 8px;text-align:center;cursor:pointer;transition:border-color .15s, background .15s;
    display:flex;flex-direction:column;align-items:center;gap:5px;min-height:64px;}
  .cell:hover{border-color:#3a3424;}
  .cell.today{border-color:var(--gold);box-shadow:0 0 0 1px #d4af3733 inset;}
  .cell.selected{background:var(--panel2);border-color:var(--gold);}
  .cell .num{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--text);}
  .cell.muted .num{color:var(--dim);}
  .dots{display:flex;gap:3px;justify-content:center;min-height:7px;}
  .cell .more{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);}

  .spacer{height:30px;}

  /* ---- day detail ---- */
  .detail{opacity:0;animation:fadeUp .5s ease .1s forwards;}
  .detail-head{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:2px;}
  .detail-sub{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--dim);margin-bottom:18px;
    text-transform:uppercase;letter-spacing:.05em;}

  .timeline{position:relative;padding-left:6px;}
  .tl-item{display:grid;grid-template-columns:64px 1fr;gap:14px;margin-bottom:4px;position:relative;}
  .tl-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);text-align:right;
    padding-top:13px;white-space:nowrap;}
  .tl-card{background:var(--panel);border-left:3px solid var(--gold);border-radius:0 9px 9px 0;
    padding:12px 16px;margin-bottom:8px;}
  .tl-card .title{font-size:14.5px;font-weight:500;color:var(--text);}
  .tl-card .who{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--dim);margin-top:3px;
    text-transform:uppercase;letter-spacing:.04em;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--dim);}
  .empty-state svg{opacity:.5;margin-bottom:14px;}
  .empty-state p{font-size:13.5px;margin:0;}

  .warn{border:1px dashed #c1554a55;border-radius:8px;padding:10px 14px;color:#d99a92;
    font-size:12px;margin-bottom:16px;font-family:'DM Mono',monospace;}

  .toolbar{display:flex;justify-content:flex-end;margin-bottom:18px;}
  button.ghost{background:none;border:1px solid var(--line);color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:12.5px;padding:7px 13px;border-radius:7px;cursor:pointer;}
  button.ghost:hover{border-color:var(--gold);color:var(--gold);}
  .loading{color:var(--dim);font-size:12.5px;font-family:'DM Mono',monospace;align-self:center;margin-right:auto;}

  @media (max-width:480px){
    .cell{min-height:54px;padding:7px 3px 6px;}
    .cell .num{font-size:15px;}
    .tl-item{grid-template-columns:50px 1fr;gap:8px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Family Calendar</h1>
      <p class="sub">Tap a day to see what's on it</p>
    </div>
    <div class="legend" id="legend"></div>
  </header>

  <div id="warnings"></div>

  <div class="grid" id="dowRow"></div>
  <div class="grid" id="grid"></div>

  <div class="spacer"></div>

  <div class="toolbar">
    <span class="loading" id="loadingMsg">Loading…</span>
    <button class="ghost" id="refreshBtn">Refresh</button>
  </div>

  <div class="detail" id="detail"></div>
</div>

<script>
const DAY_MS = 86400000;
const TODAY = stripTime(new Date());
let allEvents = [];
let selectedDate = TODAY;

function stripTime(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function sameDay(a,b) { return a.getTime() === b.getTime(); }
function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function load() {
  document.getElementById("loadingMsg").textContent = "Loading…";
  document.getElementById("refreshBtn").disabled = true;
  try {
    const res = await fetch("/.netlify/functions/calendar-feed", { cache: "no-store" });
    const data = await res.json();
    renderLegend(data.calendars);
    renderWarnings(data.calendars);

    allEvents = [];
    data.calendars.forEach((cal) => {
      (cal.events || []).forEach((ev) => {
        allEvents.push({ title: ev.summary, start: new Date(ev.start), allDay: ev.allDay, cal });
      });
    });

    renderGrid();
    renderDetail();
  } catch (err) {
    document.getElementById("detail").innerHTML = emptyState("Couldn't reach the calendar function. Check calendar-feed.js is deployed and env vars are set.");
  }
  document.getElementById("loadingMsg").textContent = "";
  document.getElementById("refreshBtn").disabled = false;
}

function renderLegend(calendars) {
  document.getElementById("legend").innerHTML = calendars.map(
    (c) => `<span><span class="swatch" style="background:${c.color}"></span>${c.label}</span>`
  ).join("");
}

function renderWarnings(calendars) {
  const broken = calendars.filter((c) => c.error);
  document.getElementById("warnings").innerHTML = broken.length
    ? broken.map((c) => `<div class="warn">${c.label}: ${escapeHtml(c.error)}</div>`).join("")
    : "";
}

function renderGrid() {
  const dowRow = document.getElementById("dowRow");
  dowRow.innerHTML = ["S","M","T","W","T","F","S"].map((d) => `<div class="dow">${d}</div>`).join("");

  // align so the grid starts on a Sunday for the first visible week
  const startOffset = TODAY.getDay();
  const start = new Date(TODAY.getTime() - startOffset * DAY_MS);

  let html = "";
  for (let i = 0; i < 21; i++) {
    const date = new Date(start.getTime() + i * DAY_MS);
    const isToday = sameDay(date, TODAY);
    const isSelected = sameDay(date, selectedDate);
    const isPast = date < TODAY;
    const dayEvents = allEvents.filter((ev) => sameDay(stripTime(ev.start), date));
    const uniqueColors = [...new Map(dayEvents.map((e) => [e.cal.color, e.cal.color])).values()];
    const dots = uniqueColors.slice(0, 4).map((c) => `<span class="swatch" style="background:${c}"></span>`).join("");
    const extra = dayEvents.length > 4 ? `<span class="more">+${dayEvents.length - 4}</span>` : "";

    html += `<div class="cell${isToday ? " today" : ""}${isSelected ? " selected" : ""}${isPast ? " muted" : ""}"
      data-date="${date.getTime()}">
      <span class="num">${date.getDate()}</span>
      <div class="dots">${dots}${extra}</div>
    </div>`;
  }
  document.getElementById("grid").innerHTML = html;

  document.querySelectorAll(".cell").forEach((cell) => {
    cell.addEventListener("click", () => {
      selectedDate = new Date(Number(cell.dataset.date));
      renderGrid();
      renderDetail();
    });
  });
}

function renderDetail() {
  const dayEvents = allEvents
    .filter((ev) => sameDay(stripTime(ev.start), selectedDate))
    .sort((a, b) => a.start - b.start);

  const isToday = sameDay(selectedDate, TODAY);
  const dateLabel = selectedDate.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });

  let html = `<div class="detail-head">${isToday ? "Today" : dateLabel}</div>
    <div class="detail-sub">${isToday ? dateLabel + " · " : ""}${dayEvents.length} event${dayEvents.length === 1 ? "" : "s"}</div>`;

  if (!dayEvents.length) {
    html += emptyState("Nothing on the calendar. Breathe.");
  } else {
    html += `<div class="timeline">` + dayEvents.map((ev) => `
      <div class="tl-item">
        <div class="tl-time">${ev.allDay ? "All day" : ev.start.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}</div>
        <div class="tl-card" style="border-left-color:${ev.cal.color}">
          <div class="title">${escapeHtml(ev.title)}</div>
          <div class="who">${ev.cal.label}</div>
        </div>
      </div>`).join("") + `</div>`;
  }

  document.getElementById("detail").innerHTML = html;
}

function emptyState(msg) {
  return `<div class="empty-state">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <rect x="3" y="5" width="18" height="16" rx="3"/>
      <path d="M8 3v4M16 3v4M3 10h18"/>
    </svg>
    <p>${escapeHtml(msg)}</p>
  </div>`;
}

document.getElementById("refreshBtn").addEventListener("click", load);
load();
</script>
</body>
</html>
